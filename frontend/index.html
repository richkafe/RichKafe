<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- Viewport: prevents zoom, fits all mobile screens properly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- iOS Safari full-screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#090a0f" />
    <title>Rich Cafe - Mini App Menu</title>

    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Leaflet CSS & JS for interactive delivery map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <style>
      /* Quick style reset for HTML/Body to prevent scroll jank in Telegram Webview */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        /* Use actual viewport height including safe areas */
        height: -webkit-fill-available;
        overflow: hidden;
        background-color: #090a0f; /* Match App.css --bg-dark */
        color: #ffffff;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        -webkit-tap-highlight-color: transparent;
        /* Prevent overscroll bounce on iOS */
        overscroll-behavior: none;
      }
      #root {
        width: 100%;
        height: 100%;
        height: -webkit-fill-available;
        height: 100svh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
        /* Safe area support for notched phones */
        padding-top: env(safe-area-inset-top, 0px);
      }
    </style>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
